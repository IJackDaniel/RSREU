# Database connection
database.url=jdbc:oracle:thin:@localhost:1521/XE
database.user=system
database.password=password
database.driver=oracle.jdbc.driver.OracleDriver

# Queries
query.tickets.after.date = \
    SELECT t.appointment_ticket_number, t.appointment_datetime, \
           t.doctor_personnel_number, t.patient_insurance_policy_number, \
           t.insurance_payment_amount \
    FROM appointment_tickets t \
    WHERE t.appointment_datetime > ? \
    ORDER BY t.appointment_datetime

query.doctors.by.patient = \
    SELECT DISTINCT d.doctor_personnel_number, d.doctor_surname, \
           d.doctor_specialization, d.doctor_office_number \
    FROM doctors d \
    JOIN appointment_tickets t ON d.doctor_personnel_number = t.doctor_personnel_number \
    JOIN patients p ON t.patient_insurance_policy_number = p.patient_insurance_policy_number \
    WHERE p.patient_surname = ? \
    ORDER BY d.doctor_surname

query.average.patients.per.doctor = \
    SELECT d.doctor_personnel_number, d.doctor_surname, \
           COUNT(DISTINCT t.patient_insurance_policy_number) AS patient_count \
    FROM doctors d \
    LEFT JOIN appointment_tickets t ON d.doctor_personnel_number = t.doctor_personnel_number \
    GROUP BY d.doctor_personnel_number, d.doctor_surname

message.connected = Connected to Oracle DB!
message.error.connection = Failed to connect to database
message.error.query = Error executing query

