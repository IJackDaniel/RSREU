database.url=jdbc:oracle:thin:@localhost:1521/XE
database.user=system
database.password=password
database.driver=oracle.jdbc.driver.OracleDriver

select.appointment.tickets.after.datetime=
SELECT \
appointment_tickets.appointment_ticket_number, \
appointment_tickets.appointment_datetime, \
doctors.doctor_surname, \
patients.patient_surname, \
appointment_tickets.insurance_payment_amount \
FROM appointment_tickets \
INNER JOIN doctors \
ON appointment_tickets.doctor_personnel_number = \
doctors.doctor_personnel_number \
INNER JOIN patients \
ON appointment_tickets.patient_insurance_policy_number = \
patients.patient_insurance_policy_number \
WHERE appointment_tickets.appointment_datetime > ? \
ORDER BY appointment_tickets.appointment_datetime

select.doctors.by.patient.insurance.policy.number=
SELECT DISTINCT \
doctors.doctor_personnel_number, \
doctors.doctor_surname, \
doctors.doctor_specialization, \
doctors.doctor_office_number \
FROM doctors \
INNER JOIN appointment_tickets \
ON doctors.doctor_personnel_number = \
appointment_tickets.doctor_personnel_number \
WHERE appointment_tickets.patient_insurance_policy_number = ?

select.average.patient.quantity.by.doctor=
SELECT \
doctors.doctor_personnel_number, \
doctors.doctor_surname, \
AVG(doctor_patient_statistics.patient_quantity) \
AS average_patient_quantity \
FROM doctors \
INNER JOIN ( \
SELECT \
appointment_tickets.doctor_personnel_number, \
COUNT(appointment_tickets.patient_insurance_policy_number) \
AS patient_quantity \
FROM appointment_tickets \
GROUP BY appointment_tickets.doctor_personnel_number \
) doctor_patient_statistics \
ON doctors.doctor_personnel_number = \
doctor_patient_statistics.doctor_personnel_number \
GROUP BY \
doctors.doctor_personnel_number, \
doctors.doctor_surname